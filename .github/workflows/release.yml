name: Release Plugin

on:
  push:
    tags:
      - 'v*.*.*'  # 当推送 v1.0.0 这样的 tag 时触发
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.4 or v1.0.4)'
        required: true
      jadx_version:
        description: 'JADX version to download (default 1.5.5)'
        required: false
        default: '1.5.5'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven
    
    - name: Get version
      id: get_version
      shell: bash
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          VERSION_INPUT="${{ github.event.inputs.version }}"
          VERSION="${VERSION_INPUT#v}"
        else
          VERSION="${GITHUB_REF#refs/tags/v}"
        fi
        echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Resolved VERSION=$VERSION"

    - name: Resolve JADX version
      id: get_jadx_version
      shell: bash
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.jadx_version }}" ]]; then
          JADX_VERSION="${{ github.event.inputs.jadx_version }}"
        else
          JADX_VERSION="1.5.5"
        fi
        echo "JADX_VERSION=$JADX_VERSION" >> "$GITHUB_OUTPUT"
        echo "Resolved JADX_VERSION=$JADX_VERSION"
    
    - name: Download JADX GUI JAR
      shell: bash
      run: |
        mkdir -p lib
        JADX_VERSION="${{ steps.get_jadx_version.outputs.JADX_VERSION }}"
        DOWNLOAD_URL="https://github.com/skylot/jadx/releases/download/v${JADX_VERSION}/jadx-gui-${JADX_VERSION}-all.jar"
        echo "Downloading JADX from: $DOWNLOAD_URL"
        curl -fL "$DOWNLOAD_URL" -o lib/jadx-gui.jar
        ls -lh lib/jadx-gui.jar
    
    - name: Update version in pom.xml
      run: |
        mvn versions:set -DnewVersion=${{ steps.get_version.outputs.VERSION }}
        mvn versions:commit
    
    - name: Build with Maven
      run: mvn clean package -DskipTests
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: target/jadx-frida-hookall-${{ steps.get_version.outputs.VERSION }}.jar
        generate_release_notes: true  # 自动生成 Release Notes
        body: |
          ## 📦 JADX Frida HookAll Plugin v${{ steps.get_version.outputs.VERSION }}
          
          ### 安装方法
          
          **方式 1：命令行安装（推荐）**
          ```bash
          jadx plugins --install "github:LunFengChen:jadx-frida-hookall"
          ```
          
          **方式 2：GUI 安装**
          1. JADX GUI → `Plugins` → `Install plugin`
          2. 输入：`github:LunFengChen:jadx-frida-hookall`
          3. 重启 JADX
          
          **方式 3：手动安装**
          1. 下载下方的 JAR 文件
          2. JADX GUI → `Plugins` → `Install plugin` → 选择 JAR 文件
          3. 重启 JADX
          
          💡 插件相关介绍请查看 [README](https://github.com/LunFengChen/jadx-frida-hookall#readme)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
